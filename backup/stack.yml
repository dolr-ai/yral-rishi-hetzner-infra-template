# Backup service — runs daily pg_dump to S3-compatible object storage.
#
# Deployed as part of the DB Swarm stack. Uses Swarm's restart_policy with
# a delay to implement "run once per day" scheduling without cron. The
# container runs backup.sh, exits 0, waits 24h, then Swarm restarts it.
#
# NETWORK: the backup container does NOT join the per-project overlay network
# explicitly. Instead, it uses the Swarm stack's default network (which all
# services in the same stack share automatically). HAProxy is in the same
# stack, so `haproxy-rishi-1:5432` resolves via the default network's DNS.
#
# WHY NOT the overlay? Adding a 4th compose file that references the overlay
# caused Docker Swarm to try creating a stack-prefixed duplicate network
# (>63 chars). This is a Docker bug/limitation with long stack names.
# The default network sidesteps it entirely.
#
# All ${VAR} interpolations come from the shell env, which
# scripts/ci/deploy-db-stack.sh populates from project.config.

version: "3.8"

services:
  backup:
    image: ${BACKUP_IMAGE_REPO:-backup}:${IMAGE_TAG:-latest}
    environment:
      PGHOST: "haproxy-rishi-1"
      PGPORT: "5432"
      PGUSER: "postgres"
      POSTGRES_DB: ${POSTGRES_DB}
      PROJECT_REPO: ${PROJECT_REPO}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY}
    secrets:
      - postgres_password
    entrypoint:
      - /bin/bash
      - -c
      - |
        export PGPASSWORD=$$(cat /run/secrets/postgres_password)
        exec /usr/local/bin/backup.sh
    deploy:
      placement:
        constraints:
          - node.labels.server == rishi-1
      restart_policy:
        condition: any
        delay: 24h
        max_attempts: 0
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

secrets:
  postgres_password:
    external: true
    name: ${SWARM_STACK}_postgres_password
