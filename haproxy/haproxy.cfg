# ---------------------------------------------------------------------------
# haproxy.cfg — HAProxy configuration for PostgreSQL routing.
#
# WHAT DOES THIS FILE DO?
# It tells HAProxy HOW to route database connections:
#   1. Listen on port 5432 (PostgreSQL's default port)
#   2. For each incoming connection, check which Patroni node is the leader
#   3. Forward the connection to the leader
#   4. If the leader changes (failover), detect it within 3 seconds
#
# HOW DOES HAPROXY KNOW WHO THE LEADER IS?
# Patroni exposes a REST API on port 8008. HAProxy sends a GET /master
# request to each Patroni node every 3 seconds:
#   - If a node IS the leader → it responds with HTTP 200
#   - If a node is NOT the leader → it responds with HTTP 503
# HAProxy only routes to nodes that respond 200.
#
# WHY "TCP MODE"?
# PostgreSQL uses its own binary protocol (not HTTP). HAProxy doesn't
# need to understand the data — it just forwards raw bytes between the
# app and PostgreSQL. "TCP mode" means "pass through raw TCP data."
# The HTTP health checks are separate — they're how HAProxy DECIDES
# where to route, but the actual data is plain TCP.
# ---------------------------------------------------------------------------

# GLOBAL section: settings that apply to the entire HAProxy instance
global
    # Send logs to stdout (Docker captures them as container logs)
    # "format raw" = don't add HAProxy's own timestamp formatting
    # "local0" = the syslog facility (a logging category)
    log stdout format raw local0

    # Maximum number of simultaneous connections HAProxy can handle
    maxconn 4096

# RESOLVERS section: tells HAProxy how to look up hostnames
#
# WHY IS THIS NEEDED?
# Docker Swarm has a built-in DNS server at 127.0.0.11 that resolves
# service names (like "patroni-rishi-1") to container IP addresses.
# Without this section, HAProxy resolves names ONCE at startup and
# never again. If a Patroni container restarts (gets a new IP), HAProxy
# would still use the old IP → connection failures.
#
# With this section, HAProxy re-resolves names every 10 seconds using
# Docker's DNS, so it always has the current IPs.
resolvers docker
    # Use Docker's built-in DNS server
    nameserver dns1 127.0.0.11:53
    # Retry DNS lookups up to 3 times
    resolve_retries 3
    # Wait up to 1 second for a DNS response
    timeout resolve 1s
    # Wait 1 second between retries
    timeout retry   1s
    # Cache DNS results for 10 seconds (then re-resolve)
    hold valid 10s

# DEFAULTS section: default settings for all frontends and backends
defaults
    # Use the global log settings
    log global
    # TCP mode: pass through raw TCP data (needed for PostgreSQL's binary protocol)
    mode tcp
    # Log TCP-level connection info (source IP, bytes transferred, duration)
    option tcplog
    # Connection timeout: give up connecting to a backend after 5 seconds
    timeout connect 5s
    # Client timeout: drop idle client connections after 60 seconds
    timeout client 60s
    # Server timeout: drop idle server connections after 60 seconds
    timeout server 60s

# FRONTEND section: where HAProxy LISTENS for incoming connections
frontend postgresql_frontend
    # Listen on port 5432 (PostgreSQL's standard port) on all network interfaces (*)
    # The app connects to haproxy-rishi-1:5432 via the db-internal overlay network
    bind *:5432
    # Route all connections to the "postgresql_primary" backend
    default_backend postgresql_primary

# BACKEND section: WHERE HAProxy forwards connections to
backend postgresql_primary
    # Use HTTP to check which Patroni node is the leader.
    # "GET /master" asks Patroni: "are you the leader?"
    # Patroni responds 200 if yes, 503 if no.
    option httpchk GET /master
    # Only consider a node healthy if it responds with HTTP 200
    http-check expect status 200

    # THE THREE PATRONI SERVERS:
    # Each "server" line defines one possible destination for SQL connections.
    #
    # FORMAT: server NAME HOST:PORT OPTIONS
    #   NAME               = a label for this server (for logs/stats)
    #   HOST:PORT          = where PostgreSQL listens (service name on overlay:5432)
    #   maxconn 100        = max 100 simultaneous connections to this server
    #   check port 8008    = health-check Patroni's REST API on port 8008 (not 5432)
    #   inter 3s           = check every 3 seconds
    #   fall 3             = mark as DOWN after 3 consecutive failed checks (9s total)
    #   rise 2             = mark as UP after 2 consecutive successful checks (6s total)
    #   resolvers docker   = use Docker's DNS to resolve the hostname
    #   init-addr none     = don't fail if the name can't be resolved at startup
    #                        (Patroni might not be running yet when HAProxy starts)
    server patroni-rishi-1 patroni-rishi-1:5432 maxconn 100 check port 8008 inter 3s fall 3 rise 2 resolvers docker init-addr none
    server patroni-rishi-2 patroni-rishi-2:5432 maxconn 100 check port 8008 inter 3s fall 3 rise 2 resolvers docker init-addr none
    server patroni-rishi-3 patroni-rishi-3:5432 maxconn 100 check port 8008 inter 3s fall 3 rise 2 resolvers docker init-addr none
