name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  # ============================================================================
  # JOB 0: Read WITH_DATABASE from project.config so later jobs can gate on it.
  # Job-level `if:` can't read $GITHUB_ENV from a step, so we expose the flag
  # as a job output instead.
  # ============================================================================
  config:
    name: Read project.config flags
    runs-on: ubuntu-latest
    outputs:
      with_database: ${{ steps.flags.outputs.with_database }}
    steps:
      - uses: actions/checkout@v4
      - id: flags
        run: |
          WITH_DB=$(grep '^WITH_DATABASE=' project.config | cut -d= -f2)
          echo "with_database=${WITH_DB:-true}" >> $GITHUB_OUTPUT

  # ============================================================================
  # JOB 1: Load project.config + build images and push to GHCR.
  # Tagged with both :latest (alias) and :${git-sha} (immutable).
  # ============================================================================
  gitleaks:
    name: Scan repo for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the gitleaks binary directly. The official gitleaks-action now
      # requires a paid license for org repos; the CLI itself is still free.
      - name: Install and run gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  test:
    name: Run unit tests + template integrity checks
    runs-on: ubuntu-latest
    needs: config
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: pytest
        run: pytest tests/ -v
      - name: Template integrity
        run: bash tests/test_template_integrity.sh

  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [config, test, gitleaks]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load project.config into job env
        # Parses every KEY=value line into $GITHUB_ENV so subsequent steps
        # can use ${{ env.PROJECT_NAME }}, ${{ env.IMAGE_REPO }}, etc.
        run: |
          grep -v '^#' project.config | grep -v '^$' >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}

      - name: Trivy vulnerability scan (CRITICAL — fails the build)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: "1"          # CRITICAL CVEs block the deploy
          ignore-unfixed: true

      - name: Trivy vulnerability scan (HIGH — report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ github.sha }}
          format: table
          severity: HIGH
          exit-code: "0"          # HIGH is too noisy to break builds; surface only
          ignore-unfixed: true

      - name: Build and push Patroni image
        if: needs.config.outputs.with_database == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./patroni
          push: true
          tags: |
            ${{ env.PATRONI_IMAGE_REPO }}:latest
            ${{ env.PATRONI_IMAGE_REPO }}:${{ github.sha }}

  # ============================================================================
  # JOB 2: Deploy etcd + Patroni + HAProxy as the project's Swarm stack.
  # Pre-pulls the Patroni image on each server (private GHCR auth issue).
  # ============================================================================
  deploy-db-stack:
    name: Deploy etcd + Patroni + HAProxy (Swarm stack)
    runs-on: ubuntu-latest
    needs: [config, build-and-push]
    if: needs.config.outputs.with_database == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Load project.config + servers.config into job env
        run: |
          # Both files use simple KEY=value lines. Strip comments and blanks,
          # append to $GITHUB_ENV. Order: project.config first, servers.config
          # second (so servers.config can't be accidentally overridden).
          grep -v '^#' project.config | grep -v '^$' >> $GITHUB_ENV
          grep -v '^#' servers.config | grep -v '^$' >> $GITHUB_ENV

      - name: Copy stack files + project.config + CI script to Swarm manager (rishi-1)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_1_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          source: "etcd/stack.yml,patroni/stack.yml,haproxy/stack.yml,haproxy/haproxy.cfg,scripts/ci/deploy-db-stack.sh,project.config"
          target: /home/deploy/${{ env.SWARM_STACK }}-stack

      - name: Pre-pull Patroni image on Server 1
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_1_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.PATRONI_IMAGE_REPO }}:${{ github.sha }}

      - name: Pre-pull Patroni image on Server 2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_2_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.PATRONI_IMAGE_REPO }}:${{ github.sha }}

      - name: Pre-pull Patroni image on Server 3
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_3_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.PATRONI_IMAGE_REPO }}:${{ github.sha }}

      - name: Deploy stack via Swarm manager
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_1_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,POSTGRES_PASSWORD,REPLICATION_PASSWORD,GITHUB_TOKEN,GITHUB_ACTOR,STACK_DIR
          script: |
            chmod +x ${STACK_DIR}/scripts/ci/deploy-db-stack.sh
            ${STACK_DIR}/scripts/ci/deploy-db-stack.sh
        env:
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REPLICATION_PASSWORD: ${{ secrets.REPLICATION_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          STACK_DIR: /home/deploy/${{ env.SWARM_STACK }}-stack

  # ============================================================================
  # JOB 3: Deploy app + Caddy snippet to rishi-1 and rishi-2.
  # ============================================================================
  deploy-app:
    name: Deploy app + Caddy snippet to rishi-1 and rishi-2
    runs-on: ubuntu-latest
    needs: [config, build-and-push, deploy-db-stack]
    # Run even if deploy-db-stack was skipped (stateless service).
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.deploy-db-stack.result == 'success' || needs.deploy-db-stack.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Load project.config + servers.config into job env
        run: |
          # Both files use simple KEY=value lines. Strip comments and blanks,
          # append to $GITHUB_ENV. Order: project.config first, servers.config
          # second (so servers.config can't be accidentally overridden).
          grep -v '^#' project.config | grep -v '^$' >> $GITHUB_ENV
          grep -v '^#' servers.config | grep -v '^$' >> $GITHUB_ENV

      # ============================================================
      # CANARY DEPLOY: rishi-1 first, with sustained verify + auto-
      # rollback INSIDE the deploy script. If anything goes wrong on
      # rishi-1 the script exits non-zero, this job fails BEFORE
      # touching rishi-2, and rishi-2 stays on the previous healthy
      # image. Cloudflare DNS round-robin keeps serving 50% of users.
      # ============================================================

      # ---------- SERVER 1 (canary) ----------
      - name: Copy app files to Server 1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_1_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/snippet.caddy.template,scripts/ci/deploy-app.sh,project.config"
          target: /home/deploy/${{ env.PROJECT_REPO }}

      - name: Deploy + verify + auto-rollback on Server 1 (canary)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_1_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          envs: IMAGE_TAG,DATABASE_URL,SENTRY_DSN,GITHUB_TOKEN,GITHUB_ACTOR,APP_DIR
          script: |
            chmod +x ${APP_DIR}/scripts/ci/deploy-app.sh
            ${APP_DIR}/scripts/ci/deploy-app.sh
        env:
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_SERVER_1 }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          APP_DIR: /home/deploy/${{ env.PROJECT_REPO }}

      # ---------- SERVER 2 (only runs if Server 1 fully succeeded) ----------
      - name: Copy app files to Server 2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_2_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/snippet.caddy.template,scripts/ci/deploy-app.sh,project.config"
          target: /home/deploy/${{ env.PROJECT_REPO }}

      - name: Deploy + verify + auto-rollback on Server 2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_2_IP }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          envs: IMAGE_TAG,DATABASE_URL,SENTRY_DSN,GITHUB_TOKEN,GITHUB_ACTOR,APP_DIR
          script: |
            chmod +x ${APP_DIR}/scripts/ci/deploy-app.sh
            ${APP_DIR}/scripts/ci/deploy-app.sh
        env:
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_SERVER_2 }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          APP_DIR: /home/deploy/${{ env.PROJECT_REPO }}
